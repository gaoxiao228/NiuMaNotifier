services:
  remote-server:
    build: .
    ports:
      - "27880:27880"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  remote-client-web:
    build:
      context: ..
      dockerfile: remote-client-web/Dockerfile
      args:
        # Vite 静态资源在构建期写入服务端地址，运行期 environment 不会改写已构建产物。
        VITE_REMOTE_SERVER_URL: http://127.0.0.1:27880
    ports:
      - "27883:80"
    depends_on:
      - remote-server

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: niuma_remote
      POSTGRES_USER: niuma
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  coturn:
    image: coturn/coturn:latest
    profiles:
      - turn
    ports:
      - "13478:3478/udp"
      - "13478:3478/tcp"
    command:
      - --listening-port=3478
      - --fingerprint
      - --lt-cred-mech
      - --realm=niuma-remote

volumes:
  postgres_data:
  redis_data:
