name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 使用 npm lockfile 固定依赖，避免 CI 与本地安装出入过大。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test

  rust:
    name: Rust workspace
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # macOS runner 覆盖桌面端和平台相关测试，避免 Linux 缺少 Tauri WebKit 系统依赖。
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --workspace

  package:
    name: Package macOS app
    runs-on: macos-latest
    permissions:
      contents: write
    needs:
      - frontend
      - rust
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # tag 打包复用 lockfile 安装依赖，保证产物使用可复现的前端依赖版本。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Resolve tag version
        id: tag-version
        shell: bash
        run: |
          # 允许 v1.2.3 或 1.2.3 形式的版本 tag，写入包版本时去掉可选的 v 前缀。
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' 不是有效版本号，请使用 v1.2.3 或 1.2.3 格式。"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Apply tag version
        run: node -e "const fs = require('fs'); const version = process.env.RELEASE_VERSION; for (const file of ['package.json', 'src-tauri/tauri.conf.json']) { const json = JSON.parse(fs.readFileSync(file, 'utf8')); json.version = version; fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n'); }"
        env:
          RELEASE_VERSION: ${{ steps.tag-version.outputs.version }}

      # 当前项目 README 记录的是 macOS DMG 分发包，这里只打 DMG，并使用 tag 版本号生成包版本。
      - name: Build DMG
        run: npm run tauri build -- --bundles dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: NiumaNotifier-${{ steps.tag-version.outputs.version }}-macos-dmg
          # Cargo workspace 会把 Tauri 产物输出到仓库根目录 target，而不是 src-tauri/target。
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload DMG to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.tag-version.outputs.version }}
        run: |
          # Actions artifact 只保存在 workflow run 中；Release asset 才会展示在 Releases 下载区。
          shopt -s nullglob
          dmg_files=(target/release/bundle/dmg/*.dmg)
          if (( ${#dmg_files[@]} == 0 )); then
            echo "::error::没有找到 DMG 产物，无法上传到 Release。"
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "NiumaNotifier $RELEASE_VERSION" \
              --notes "macOS DMG release for $RELEASE_TAG"
          fi

          gh release upload "$RELEASE_TAG" "${dmg_files[@]}" --clobber
